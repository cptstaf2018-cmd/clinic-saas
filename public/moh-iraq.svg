<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Outer red circle border -->
  <circle cx="100" cy="100" r="95" fill="white" stroke="#cc0000" stroke-width="6"/>

  <!-- Red crescent arc left -->
  <path d="M 25,100 A 75,75 0 0,1 100,25" fill="none" stroke="#cc0000" stroke-width="14" stroke-linecap="round"/>
  <!-- Red crescent arc right -->
  <path d="M 100,175 A 75,75 0 0,1 175,100" fill="none" stroke="#cc0000" stroke-width="14" stroke-linecap="round"/>

  <!-- Palm tree trunk -->
  <rect x="97" y="80" width="6" height="55" rx="3" fill="#2d7a2d"/>

  <!-- Palm fronds -->
  <path d="M 100,82 Q 75,65 65,45" stroke="#2d7a2d" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 100,82 Q 80,60 75,38" stroke="#2d7a2d" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 100,82 Q 90,62 92,38" stroke="#2d7a2d" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 100,82 Q 110,62 108,38" stroke="#2d7a2d" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 100,82 Q 120,60 125,38" stroke="#2d7a2d" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 100,82 Q 135,65 135,45" stroke="#2d7a2d" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Snake (caduceus) on staff -->
  <path d="M 100,88 Q 108,95 100,102 Q 92,109 100,116 Q 108,123 100,130"
        stroke="#2d7a2d" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Snake head -->
  <circle cx="100" cy="87" r="4" fill="#2d7a2d"/>

  <!-- Arabic text: وزارة الصحة العراقية -->
  <text x="100" y="158" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="11" font-weight="bold" fill="#cc0000" direction="rtl">وزارة الصحة العراقية</text>

  <!-- English text -->
  <text x="100" y="171" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="8" fill="#555">Iraqi Ministry of Health</text>
  <text x="100" y="182" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="7" fill="#888">Founded 1920</text>
</svg>
